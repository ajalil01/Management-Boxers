<!DOCTYPE html>
<html lang="ar">

</head>
<body>
    <nav class="sidebar"> <!-- نفس القائمة --> </nav>

        <div class="tabs">
            <button class="tab" onclick="goTo('session-reviews.html')">Attendance</button>
            <button class="tab active">Exercises</button>
            <button class="tab" onclick="goTo('session-reviews.html')">Reviews</button>

        <button id="addBtn" class="btn-add-exercise" onclick="toggleForm('exForm', 'addBtn')">+ Add Exercise</button>
